version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - silhouette-network

  # Database with pgvector support
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "${DB_PORT:-5436}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-miweb_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-miweb_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - silhouette-network

  # Cache & Queue Store
  redis:
    image: redis:alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    networks:
      - silhouette-network

networks:
  silhouette-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
